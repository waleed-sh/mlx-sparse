name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  format:
    name: Formatting
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python format tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir "black>=26.5.0" "isort>=6"

      - name: Python format
        run: |
          python -m black --check mlx_sparse tests benchmarks examples
          python -m isort --check-only mlx_sparse tests benchmarks examples

      - name: C++ and Metal format
        run: |
          find src -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.metal' \) -print0 \
            | xargs -0 xcrun clang-format --dry-run --Werror

  test-linux:
    name: Linux / Test
    runs-on: ubuntu-24.04
    env:
      MLX_SPARSE_TEST_DEVICE: cpu

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -e ".[dev,docs]"

      - name: Verify Linux CPU-only capability surface
        run: |
          python - <<'PY'
          import mlx_sparse as ms

          if not ms.is_available():
              raise SystemExit("native extension did not load")
          if not ms.capabilities.CPU:
              raise SystemExit("native CPU kernels are not available")
          if ms.capabilities.status("metal") != "not_built":
              raise SystemExit("Linux wheel should not compile Metal kernels")
          if ms.capabilities.status("accelerate") != "not_built":
              raise SystemExit("Linux wheel should not compile Accelerate solvers")
          if ms.capabilities.status("cuda") != "not_built":
              raise SystemExit("CUDA is not part of the current Linux build")
          if ms.capabilities.status("rocm") != "not_built":
              raise SystemExit("ROCm is not part of the current Linux build")
          PY

      - name: Tests
        run: python -m pytest -q --cov=mlx_sparse --cov-report=term-missing --cov-fail-under=88 --cov-branch --cov-append --cov-report=xml

      - name: Docs
        run: python -m sphinx -b html docs/ docs/_build/html

      - name: Build wheel
        run: python -m build --wheel

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  test-macos:
    name: macOS / Test
    runs-on: macos-15
    env:
      MLX_SPARSE_TEST_DEVICE: cpu

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Metal toolchain
        run: |
          xcrun -sdk macosx -find metal

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -e ".[dev,docs]"

      - name: Verify metallib build output
        run: test -f mlx_sparse/mlx_sparse.metallib

      - name: Tests
        run: python -m pytest -q --cov=mlx_sparse --cov-report=term-missing --cov-fail-under=88 --cov-branch --cov-append --cov-report=xml

      - name: Docs
        run: python -m sphinx -b html docs/ docs/_build/html

      - name: Build wheel
        run: python -m build --wheel

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
