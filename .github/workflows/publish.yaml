name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos-wheels:
    name: macOS wheel / Python ${{ matrix.python-version }}
    runs-on: macos-15
    env:
      # Build on the current macOS 15 arm64 runner, but tag the wheel for the
      # oldest supported runtime. This produces macosx_14_0_arm64 wheels rather
      # than misleading universal2 wheels from an arm64-only build.
      CMAKE_ARGS: "-DMLX_SPARSE_ENABLE_ACCELERATE=ON -DCMAKE_OSX_ARCHITECTURES=arm64"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      ARCHFLAGS: "-arch arm64"
      _PYTHON_HOST_PLATFORM: "macosx-14.0-arm64"

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5
        with:
          # Full history is required so setuptools-scm can read the git tag.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify Metal toolchain
        run: xcrun -sdk macosx -find metal

      - name: Install build frontend
        run: python -m pip install --upgrade pip build

      - name: Build wheel
        run: python -m build --wheel

      - name: Verify Accelerate wheel capability
        run: |
          python -m pip install --force-reinstall dist/*.whl
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          python - <<'PY'
          import mlx_sparse as ms
          from mlx_sparse._ext_loader import extension

          ext = extension()
          if ext is None:
              raise SystemExit("wheel did not load the native extension")

          facts = ext._compiled_capabilities()
          if not facts["accelerate_framework"]:
              raise SystemExit("wheel was not linked against Accelerate")

          if not facts["accelerate"]:
              raise SystemExit("wheel did not enable Accelerate sparse solvers")

          if not ms.capabilities.ACCELERATE:
              raise SystemExit("public Accelerate capability is not available")
          PY

      - name: Verify wheel architecture
        run: |
          python - <<'PY'
          import subprocess
          import tempfile
          from pathlib import Path
          from zipfile import ZipFile

          wheels = list(Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected one wheel, found {len(wheels)}")
          wheel = wheels[0]
          if "macosx_14_0_arm64" not in wheel.name:
              raise SystemExit(f"wheel has unexpected platform tag: {wheel.name}")

          with tempfile.TemporaryDirectory() as tmp:
              with ZipFile(wheel) as archive:
                  archive.extractall(tmp)
              package = Path(tmp) / "mlx_sparse"
              binaries = [
                  next(package.glob("_ext*.so")),
                  package / "libmlx_sparse_native.dylib",
              ]
              for binary in binaries:
                  info = subprocess.check_output(
                      ["lipo", "-info", str(binary)], text=True
                  )
                  if "architecture: arm64" not in info and "are: arm64" not in info:
                      raise SystemExit(
                          f"{binary.name} has unexpected architecture: {info}"
                      )
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v5
        with:
          name: wheel-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  build-linux-wheels:
    name: Linux CPU wheels
    runs-on: ubuntu-latest
    env:
      CIBW_BUILD: "cp310-manylinux_x86_64 cp311-manylinux_x86_64 cp312-manylinux_x86_64 cp313-manylinux_x86_64"
      CIBW_SKIP: "*-musllinux_*"
      CIBW_ARCHS_LINUX: "x86_64"
      CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
      CIBW_ENVIRONMENT_LINUX: "MLX_SPARSE_TEST_DEVICE=cpu"
      CIBW_TEST_COMMAND: >-
        python -c "import mlx_sparse as ms;
        assert ms.is_available();
        assert ms.capabilities.CPU;
        assert ms.capabilities.status('metal') == 'not_built';
        assert ms.capabilities.status('accelerate') == 'not_built';
        assert ms.capabilities.status('cuda') == 'not_built';
        assert ms.capabilities.status('rocm') == 'not_built'"

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build manylinux CPU wheels
        uses: pypa/cibuildwheel@v3.4.1
        with:
          output-dir: wheelhouse

      - name: Upload Linux wheel artifacts
        uses: actions/upload-artifact@v5
        with:
          name: linux-wheels
          path: wheelhouse/*.whl
          if-no-files-found: error

  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build frontend
        run: python -m pip install --upgrade pip build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: [build-macos-wheels, build-linux-wheels, build-sdist]
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/project/mlx-sparse/

    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist/
          merge-multiple: true

      - name: List distributions
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
