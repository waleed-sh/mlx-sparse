name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-wheels:
    name: Wheel / Python ${{ matrix.python-version }}
    runs-on: macos-15
    env:
      CMAKE_ARGS: "-DMLX_SPARSE_ENABLE_ACCELERATE=ON"
      MACOSX_DEPLOYMENT_TARGET: "14.0"

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5
        with:
          # Full history is required so setuptools-scm can read the git tag.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify Metal toolchain
        run: xcrun -sdk macosx -find metal

      - name: Install build frontend
        run: python -m pip install --upgrade pip build

      - name: Build wheel
        run: python -m build --wheel

      - name: Verify Accelerate wheel capability
        run: |
          python -m pip install --force-reinstall dist/*.whl
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          python - <<'PY'
          import mlx_sparse as ms
          from mlx_sparse._ext_loader import extension

          ext = extension()
          if ext is None:
              raise SystemExit("wheel did not load the native extension")

          facts = ext._compiled_capabilities()
          if not facts["accelerate_framework"]:
              raise SystemExit("wheel was not linked against Accelerate")

          if not facts["accelerate"]:
              raise SystemExit("wheel did not enable Accelerate sparse solvers")

          if not ms.capabilities.ACCELERATE:
              raise SystemExit("public Accelerate capability is not available")
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v5
        with:
          name: wheel-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: Source distribution
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build frontend
        run: python -m pip install --upgrade pip build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/project/mlx-sparse/

    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist/
          merge-multiple: true

      - name: List distributions
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
